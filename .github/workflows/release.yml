name: release

# Publish runs on main only. Staging is for PR validation via test.yml.
# Earlier setup also triggered this workflow on staging, producing
# duplicate changeset PRs and unnecessary changesets-action invocations.
on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Re-enable when a second maintainer joins, to require manual approval:
    # environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing (OIDC) requires npm 11.5.1+. Node 22 LTS still
      # ships npm 10.x; upgrade explicitly so `changeset publish` can use OIDC.
      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Lint
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      - name: Pack dry-run
        run: npm pack --dry-run

      # Smoke-test the actual artifact that will ship: pack, install into a
      # throwaway dir, run the bin against a fixture. Catches regressions
      # like missing `files`, broken `bin`, or shebang issues that source-only
      # tests miss.
      - name: Smoke-test packed tarball
        run: |
          tarball=$(npm pack 2>/dev/null | tail -1)
          mkdir -p /tmp/smoke && cd /tmp/smoke && npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/$tarball" >/dev/null
          ./node_modules/.bin/hasp-verify --version
          ./node_modules/.bin/hasp-verify "$GITHUB_WORKSPACE/test/fixtures/valid.json" --skip-tsa
          rm "$GITHUB_WORKSPACE/$tarball"

      - name: Changesets — version PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
          version: npm run version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth is via npm Trusted Publisher (OIDC) — no long-lived token.
          # Configured at https://www.npmjs.com/package/@usehasp/verify/access
          # for repo UseHasp/verify, workflow release.yml. `id-token: write`
          # above is what makes OIDC available to this step.
          NPM_CONFIG_PROVENANCE: "true"

      # changeset publish removes the .tgz after upload. Repack so the
      # attest step has a subject. Provenance is already published via
      # `NPM_CONFIG_PROVENANCE: true` above — this is a second-layer
      # attestation linked to the workflow run.
      - name: Repack for attestation
        if: steps.changesets.outputs.published == 'true'
        run: npm pack

      - name: Attest published tarball
        if: steps.changesets.outputs.published == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "*.tgz"
