name: release

on:
  push:
    branches:
      - main
      - staging

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Re-enable when a second maintainer joins, to require manual approval:
    # environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Lint
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      - name: Pack dry-run
        run: npm pack --dry-run

      - name: Changesets — version PR or publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: npm run release
          version: npm run version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auth is via npm Trusted Publisher (OIDC) — no long-lived token.
          # Configured at https://www.npmjs.com/package/@usehasp/verify/access
          # for repo UseHasp/verify, workflow release.yml. `id-token: write`
          # above is what makes OIDC available to this step.
          NPM_CONFIG_PROVENANCE: "true"

      - name: Attest published tarball
        if: steps.changesets.outputs.published == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "*.tgz"
