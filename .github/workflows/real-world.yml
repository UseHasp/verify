name: real-world

# Real-world end-to-end verification: run the actual tool against a real signed
# export through the FULL pipeline — real Ed25519, real SHA-256, a real network
# fetch of the TSA CA certificate, and a real `openssl ts -verify` of the RFC
# 3161 anchor. No `--skip-tsa`, no stubbed fetch, no bundled CA cert.
#
# Why this exists: the unit suite (workflow `test`) runs against static fixtures
# with the TSA fetch mocked, so it cannot catch a Node crypto regression, an
# `openssl` behaviour change, a global `fetch` change, or a CA-cert rotation.
# Those are exactly the breakages a dependency or Node bump can introduce. This
# workflow does catch them, so a dependency-update PR can be merged on a green
# check instead of manual testing.
#
# Strict gate: any result other than VERIFIED fails the job and blocks the PR.
# Third-party outages (freetsa.org unreachable / CA-cert URL down) fail too,
# by design — re-run the job once the service recovers. The fortnightly
# scheduled run surfaces CA-cert / generator drift even when no PRs are open.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 06:17 UTC on the 1st and 15th of each month (~every two weeks) — catches
    # TSA CA-cert rotation and live drift with no PR. Cron has no native
    # fortnightly expression; 1st/15th is the clean, drift-free approximation.
    - cron: "17 6 1,15 * *"
  workflow_dispatch:

concurrency:
  group: real-world-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  real-world:
    name: real-world (node ${{ matrix.node }})
    # Ubuntu only: macOS ships LibreSSL, whose `openssl ts -verify` behaves
    # differently (see README "macOS LibreSSL caveat") and would make a strict
    # gate spuriously flaky.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: openssl version
      - run: npm ci

      # The real-world check. Verifies the signed sample export through the full
      # pipeline including a live TSA CA-cert fetch and `openssl ts -verify`.
      # Exit 0 == VERIFIED; any other exit (failed check, network/openssl error)
      # fails the job and blocks the merge.
      - name: Verify signed export — full live TSA path
        run: node src/cli.js test/fixtures/valid.json --verbose
