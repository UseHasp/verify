name: real-world

# Real-world end-to-end verification: run the actual tool against the LIVE
# published audit export — the one anyone can download from the marketing site —
# through the FULL pipeline: a real published-key fetch from
# app.usehasp.com/trust/keys/{tenant_id}, real Ed25519 + SHA-256, a real network
# fetch of the TSA CA certificate, and a real `openssl ts -verify` of the
# RFC 3161 anchor. No `--skip-*`, no stubbed fetch, no bundled CA cert.
#
# This is the cross-repo consistency gate for HASP-197: it proves the library
# verifies what the platform actually publishes. The committed unit-test fixture
# (test/fixtures/valid.json) is a locally generated, self-issued-TSA export and
# is NOT a copy of the live sample — so there is no drift guard here anymore;
# the live verification IS the check.
#
# Scheduled + manual only (not on pull_request/push): the published sample and
# the /trust/keys endpoint are produced by the platform half of HASP-197, which
# deploys separately. Running this on every PR would hard-fail the repo until
# that lands. As a scheduled probe it simply turns green once the platform is
# live, and `workflow_dispatch` lets a human run it on demand to confirm.

on:
  schedule:
    # 06:17 UTC on the 1st and 15th of each month (~every two weeks) — catches
    # generator / TSA CA-cert drift. Cron has no native fortnightly expression;
    # 1st/15th is the clean, drift-free approximation.
    - cron: "17 6 1,15 * *"
  workflow_dispatch:

concurrency:
  group: real-world-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The live, publicly verifiable sample published by the platform.
  SAMPLE_URL: https://usehasp.com/trust/audit-export-sample.json

jobs:
  real-world:
    name: real-world (node ${{ matrix.node }})
    # Ubuntu only: macOS ships LibreSSL, whose `openssl ts -verify` behaves
    # differently (see README "macOS LibreSSL caveat") and would make a strict
    # gate spuriously flaky.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: openssl version
      - run: npm ci

      # Download the live published sample. A failure here is a usehasp.com
      # outage; the strict gate intentionally treats that as a hard failure.
      - name: Download live published sample
        run: |
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 4 --retry-all-errors \
            --max-time 30 \
            -o live-sample.json "$SAMPLE_URL"
          echo "Downloaded $(wc -c < live-sample.json) bytes from $SAMPLE_URL"

      # The real-world check: verify the LIVE sample through the full pipeline,
      # including a live published-key fetch, a live TSA CA-cert fetch, and
      # `openssl ts -verify`. Exit 0 == VERIFIED; any other exit fails the job.
      - name: Verify live sample — full live pipeline
        run: node src/cli.js live-sample.json --verbose
